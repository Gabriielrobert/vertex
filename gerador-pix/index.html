<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador PIX</title>

<style>

*{
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

body{
margin:0;
background:#0f1115;
color:#fff;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

.main-title{
font-size:26px;
font-weight:600;
margin-bottom:20px;
}

.container{
background:#171a21;
padding:35px;
border-radius:14px;
width:420px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

label{
display:block;
font-size:13px;
margin-top:12px;
margin-bottom:4px;
color:#b9c0d0;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #2a2e39;
background:#0f1115;
color:#fff;
font-size:14px;
}

input:focus{
outline:none;
border-color:#6C72F3;
}

button{
width:100%;
padding:13px;
margin-top:15px;
border:none;
border-radius:8px;
font-weight:600;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

.generate{
background:#6C72F3;
color:white;
}

.copy{
background:#2a2e39;
color:white;
}

textarea{
width:100%;
height:120px;
margin-top:15px;
padding:12px;
border-radius:8px;
border:1px solid #2a2e39;
background:#0f1115;
color:#00ff9d;
resize:none;
font-size:13px;
}

.footer{
text-align:center;
margin-top:10px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<h1 class="main-title">Gerador PIX Copia e Cola</h1>

<div class="container">

<label>Chave PIX</label>
<input id="chave" placeholder="CPF, email ou telefone">

<label>Nome do recebedor</label>
<input id="nome" placeholder="Seu nome ou Sua Marca">

<label>Cidade</label>
<input id="cidade" value="SAO PAULO">

<label>Valor</label>
<input id="valor" placeholder="Ex: 25.00">

<button class="generate" onclick="gerarPix()">
Gerar Código PIX
</button>

<textarea id="resultado" placeholder="Código PIX aparecerá aqui"></textarea>

<button class="copy" id="copyBtn" onclick="copiarPix()">
Copiar Código
</button>

<div class="footer">
PIX Generator Tool
</div>

</div>

<script>

function format(id,value){
return id + value.length.toString().padStart(2,'0') + value
}

function gerarPix(){

const chave = document.getElementById("chave").value
const nome = document.getElementById("nome").value
const cidade = document.getElementById("cidade").value

let valor = parseFloat(document.getElementById("valor").value).toFixed(2)

let payload =

format("00","01") +

format("26",
format("00","BR.GOV.BCB.PIX") +
format("01",chave)
) +

format("52","0000") +

format("53","986") +

format("54",valor) +

format("58","BR") +

format("59",nome) +

format("60",cidade) +

format("62",format("05","***"))

payload += "6304"

payload += crc16(payload)

document.getElementById("resultado").value = payload

}

function copiarPix(){

let textarea = document.getElementById("resultado")
let botao = document.getElementById("copyBtn")

textarea.select()
document.execCommand("copy")

botao.innerText = "Copiado!"
botao.style.background = "#22c55e"

setTimeout(()=>{
botao.innerText = "Copiar Código"
botao.style.background = "#2a2e39"
},2000)

}

function crc16(str){

let crc = 0xFFFF

for(let i=0;i<str.length;i++){

crc ^= str.charCodeAt(i) << 8

for(let j=0;j<8;j++){

if((crc & 0x8000)!==0){

crc = (crc << 1) ^ 0x1021

}else{

crc <<=1

}

}

}

return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4,'0')

}

</script>

</body>
</html>
